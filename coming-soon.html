<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zlý nápad — Čoskoro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>

:root {
  --red:   #D92B2B;
  --coal:  #111111;
  --ash:   #2E2E2E;
  --smoke: #4A4A4A;
  --bone:  #F0EDE6;
  --font-display: 'Bebas Neue', sans-serif;
  --font-serif:   'DM Serif Display', Georgia, serif;
  --font-mono:    'DM Mono', monospace;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--coal);
  color: var(--bone);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: none;
  overflow: hidden;
}

/* CURSOR */
.cursor {
  position: fixed;
  width: 10px; height: 10px;
  background: var(--red);
  border-radius: 50%;
  pointer-events: none;
  z-index: 999;
  transform: translate(-50%,-50%);
  transition: width .3s var(--ease), height .3s var(--ease);
  mix-blend-mode: difference;
}
.cursor.big { width: 34px; height: 34px; }

/* TOP BAR */
.bar {
  height: 3px;
  background: var(--red);
  transform-origin: left;
  animation: barIn 1.2s var(--ease) .1s both;
}
@keyframes barIn { from { transform: scaleX(0); } to { transform: scaleX(1); } }

/* GHOST */
.ghost {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; overflow: hidden;
}
.ghost span {
  font-family: var(--font-display);
  font-size: clamp(180px, 30vw, 440px);
  line-height: .85;
  color: transparent;
  -webkit-text-stroke: 1px rgba(217,43,43,.05);
  text-align: center;
  animation: drift 20s ease-in-out infinite alternate;
}
@keyframes drift {
  from { transform: translateX(-20px) rotate(-1deg); }
  to   { transform: translateX(20px)  rotate(1deg); }
}

/* MAIN */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 48px;
  position: relative;
  z-index: 1;
}

.eyebrow {
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
  color: var(--red);
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 24px;
  animation: up .8s var(--ease) .4s both;
}
.eyebrow::before { content: ''; width: 32px; height: 1px; background: var(--red); }

h1 {
  font-family: var(--font-display);
  font-size: clamp(72px, 13vw, 180px);
  line-height: .88; letter-spacing: 1px;
  animation: up .9s var(--ease) .55s both;
}
h1 span { color: var(--red); display: block; }

.sub {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: clamp(18px, 2vw, 26px);
  color: var(--smoke);
  max-width: 480px;
  line-height: 1.5;
  margin-top: 28px;
  animation: up .9s var(--ease) .7s both;
}

/* FOOTER */
footer {
  padding: 28px 48px;
  border-top: 1px solid var(--ash);
  display: flex; align-items: center; justify-content: space-between;
  position: relative; z-index: 1;
  animation: fadeIn 1s var(--ease) 1s both;
}

.logo {
  font-family: var(--font-display);
  font-size: 18px; letter-spacing: 3px;
  display: flex; align-items: center; gap: 10px;
}
.logo span { color: var(--red); }

.fb-link {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--red); text-decoration: none; cursor: none;
  display: flex; align-items: center; gap: 8px;
  transition: opacity .2s;
}
.fb-link:hover { opacity: .7; }
.fb-link svg { width: 14px; height: 14px; fill: currentColor; }

@keyframes up     { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

@media (max-width: 600px) {
  main, footer { padding-left: 24px; padding-right: 24px; }
  body { cursor: auto; }
  .cursor { display: none; }
}

</style>
</head>
<body>

<div class="cursor" id="cur"></div>
<div class="bar"></div>
<div class="ghost"><span>ZLÝ<br>NÁPAD</span></div>

<main>
  <div class="eyebrow">Čoskoro</div>
  <h1>PRIPRAVUJEME<span>NIEČO.</span></h1>
  <p class="sub">Kritická analýza nápadov — bez cukrovania.<br>Sleduj nás na Facebooku.</p>
</main>

<footer>
  <div class="logo">ZLÝ <span>NÁPAD</span></div>
  <a href="https://www.facebook.com/zlynapad" target="_blank" class="fb-link">
    <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
    Facebook ↗
  </a>
</footer>

<script>
const cur = document.getElementById('cur');
let mx=0,my=0,cx=0,cy=0;
document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
(function a(){ cx+=(mx-cx)*.14; cy+=(my-cy)*.14; cur.style.left=cx+'px'; cur.style.top=cy+'px'; requestAnimationFrame(a); })();
document.querySelectorAll('a').forEach(el => {
  el.addEventListener('mouseenter', () => cur.classList.add('big'));
  el.addEventListener('mouseleave', () => cur.classList.remove('big'));
});
</script>

</body>
</html>
